name: Weekly Mediation Blog Post

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog-post:
    name: Generate blog post draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly blog post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
        run: node scripts/generate-blog-post.mjs

      - name: Build project
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add weekly mediation blog post"
          title: "Add weekly mediation blog post"
          body: |
            This pull request was generated automatically.

            It adds a new SEO blog post to `lib/blog.ts`.

            Review before merging:
            - legal accuracy,
            - official sources,
            - tone,
            - SEO title and meta description,
            - internal links,
            - factual correctness.

            After merge, Vercel will deploy the updated site automatically.
          branch: "automation/weekly-mediation-blog-post"
          delete-branch: true
          labels: |
            blog
            automation